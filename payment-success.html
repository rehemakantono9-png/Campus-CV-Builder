<!DOCTYPE html>
<html>
<head>
    <title>Download Success</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body style="text-align:center; padding:50px; background:#f4f7f6;">
    <div class="panel" style="max-width:500px; margin:auto; padding:40px;">
        <h1 style="color:green;">✔ Payment Successful</h1>
        <p id="status">Generating your professional CV now...</p>
        <div id="loader" class="loader"></div>
        
        <div id="cvPreview" class="cv" style="display:none; text-align:left;"></div>
        
        <div id="final-actions" style="display:none; margin-top:20px;">
            <button onclick="downloadPDF()" class="primary-btn">Download Again</button>
            <button onclick="location.href='index.html'" class="secondary-btn">New CV</button>
        </div>
    </div>

    <script>
        function downloadPDF() {
            const el = document.getElementById('cvPreview');
            html2pdf().from(el).set({
                margin: 0.5,
                filename: 'My_CampusCV.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).save().then(() => {
                document.getElementById('status').innerText = "Download Complete!";
                document.getElementById('final-actions').style.display = "block";
            });
        }

        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('campusCV_Data'));
            if (data && data.html) {
                document.getElementById('cvPreview').innerHTML = data.html;
                downloadPDF();
            } else {
                document.getElementById('status').innerText = "Data error. Please go back.";
            }
        };
    </script>
</body>
</html>
